<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mundo Equidad – Mi Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles/style.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; }

    .dash-hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
      padding: 52px 24px 48px;
      text-align: center;
    }
    .dash-hero h1 { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; color: #fff; margin: 0 0 6px; }
    .dash-hero p  { color: rgba(255,255,255,.75); margin: 0 0 40px; font-size: .95rem; }

    /* Tarjetas de acción */
    .action-cards {
      display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
      max-width: 900px; margin: 0 auto;
    }
    .action-card {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px; padding: 28px 24px;
      width: 220px; text-align: center;
      cursor: pointer; text-decoration: none;
      transition: transform .2s, background .2s, border-color .2s;
      backdrop-filter: blur(10px);
    }
    .action-card:hover { transform: translateY(-4px); background: rgba(255,255,255,.18); border-color: var(--cyan); }
    .action-card .ac-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 1.4rem;
    }
    .ac-icon.cyan   { background: rgba(0,200,212,.2); color: var(--cyan); }
    .ac-icon.purple { background: rgba(108,63,197,.2); color: #a77cff; }
    .ac-icon.blue   { background: rgba(26,58,143,.3);  color: #6fa3ff; }
    .ac-icon.green  { background: rgba(34,197,94,.15); color: #4ade80; }
    .action-card h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; color: #fff; margin: 0 0 6px; }
    .action-card p  { font-size: .8rem; color: rgba(255,255,255,.6); margin: 0; line-height: 1.4; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">MUNDO <span>EQUIDAD</span></a>
    <ul class="nav-links">
      <li><span style="color:rgba(255,255,255,.7);font-size:.9rem">
        <i class="fas fa-user" style="color:var(--cyan);margin-right:6px"></i>
        <span id="nombre-usuario">...</span>
      </span></li>
      <li><button class="btn-nav" onclick="logout()" style="cursor:pointer;border:none;background:transparent;padding:0">
        <i class="fas fa-sign-out-alt"></i> Salir
      </button></li>
    </ul>
  </nav>

  <div class="dash-hero">
    <h1>Bienvenido, <span id="nombre-hero">...</span></h1>
    <p>¿Qué quieres hacer hoy?</p>

    <div class="action-cards" id="action-cards">
      <!-- Se renderizan desde JS según si el usuario tiene CV o no -->
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-info-circle" id="toast-icon"></i>
    <span id="toast-msg"></span>
  </div>

  <script type="module">
    import { requireAuth, cargarUsuario, logout } from './js/core/auth-guard.js';
    requireAuth();

    async function init() {
      const u = await cargarUsuario();
      if (!u) return;

      document.getElementById('nombre-usuario').textContent = u.nombre;
      document.getElementById('nombre-hero').textContent    = u.nombre;

      const cv = u.cv;
      const tieneCV = cv && (
        cv.datosPersonales?.nombre ||
        cv.perfilLaboral ||
        cv.educacion?.length ||
        cv.referencias?.length
      );

      const cards = document.getElementById('action-cards');

      if (tieneCV) {
        // Usuario con CV: Mi Hoja de Vida + Cursos + Vacantes
        cards.innerHTML = `
          <a href="mi-hoja-de-vida.html" class="action-card">
            <div class="ac-icon green"><i class="fas fa-address-card"></i></div>
            <h3>Mi Hoja de Vida</h3>
            <p>Consulta, actualiza y exporta tu perfil profesional</p>
          </a>
          <a href="cursos.html" class="action-card">
            <div class="ac-icon purple"><i class="fas fa-graduation-cap"></i></div>
            <h3>Cursos Gratuitos</h3>
            <p>Capacítate con los mejores recursos en línea</p>
          </a>
          <a href="vacantes.html" class="action-card">
            <div class="ac-icon blue"><i class="fas fa-briefcase"></i></div>
            <h3>Ver Vacantes</h3>
            <p>Encuentra empleos disponibles para ti</p>
          </a>
        `;
      } else {
        // Primera vez o sin CV: solo Crear HV + Cursos
        cards.innerHTML = `
          <a href="hoja-de-vida.html" class="action-card">
            <div class="ac-icon cyan"><i class="fas fa-id-card"></i></div>
            <h3>Crear Hoja de Vida</h3>
            <p>Completa tu perfil profesional y destácate</p>
          </a>
          <a href="cursos.html" class="action-card">
            <div class="ac-icon purple"><i class="fas fa-graduation-cap"></i></div>
            <h3>Cursos Gratuitos</h3>
            <p>Capacítate con los mejores recursos en línea</p>
          </a>
        `;
      }
    }

    window.logout = logout;
    init();
  </script>
</body>
</html>
