<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mundo Equidad – Publicar Vacante</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles/style.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; }

    .page-header {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      padding: 40px 24px; text-align: center;
    }
    .page-header h1 { font-family: 'Rajdhani', sans-serif; font-size: 2rem; color: #fff; margin: 0 0 6px; }
    .page-header p  { color: rgba(255,255,255,.75); margin: 0; font-size: .95rem; }

    .form-container { max-width: 620px; margin: 40px auto; padding: 0 24px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,.6); font-size: .9rem; text-decoration: none;
      margin-bottom: 24px; transition: color .2s;
    }
    .back-link:hover { color: var(--cyan); }

    .card-form {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px; padding: 36px; backdrop-filter: blur(10px);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: rgba(255,255,255,.7); font-size: .85rem; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; color: #fff; font-family: 'Exo 2', sans-serif; font-size: .92rem;
      outline: none; transition: border-color .2s; box-sizing: border-box;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,.3); }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--cyan); }
    .form-group select option { background: #0b1535; }
    .form-group textarea { resize: vertical; min-height: 120px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    .btn-publicar {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700;
      letter-spacing: .5px; cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .btn-publicar:hover    { opacity: .85; }
    .btn-publicar:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">MUNDO <span>EQUIDAD</span></a>
    <ul class="nav-links">
      <li><button class="btn-nav" onclick="logout()" style="cursor:pointer;border:none;background:transparent;padding:0">
        <i class="fas fa-sign-out-alt"></i> Salir
      </button></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1><i class="fas fa-plus-circle" style="margin-right:10px"></i>Publicar Vacante</h1>
    <p>Crea una nueva oferta de empleo para tu empresa</p>
  </div>

  <div class="form-container">
    <a href="dashboard-empresa.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Volver al dashboard
    </a>

    <div class="card-form">
      <form id="form-vacante" novalidate>

        <div class="form-group">
          <label>Título del cargo *</label>
          <input type="text" id="titulo" placeholder="Ej: Desarrollador Frontend"/>
        </div>

        <div class="form-group">
          <label>Descripción *</label>
          <textarea id="descripcion" placeholder="Describe el cargo, requisitos y funciones..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Ubicación *</label>
            <input type="text" id="ubicacion" placeholder="Ej: Bogotá, Colombia"/>
          </div>
          <div class="form-group">
            <label>Salario</label>
            <input type="text" id="salario" placeholder="Ej: 2.500.000 COP"/>
          </div>
        </div>

        <div class="form-group">
          <label>Modalidad</label>
          <select id="modalidad">
            <option value="presencial">Presencial</option>
            <option value="remoto">Remoto</option>
            <option value="hibrido">Híbrido</option>
          </select>
        </div>

        <button type="submit" class="btn-publicar" id="btn-publicar">
          <i class="fas fa-paper-plane" style="margin-right:8px"></i>Publicar Vacante
        </button>

      </form>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-info-circle" id="toast-icon"></i>
    <span id="toast-msg"></span>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/core/auth-guard.js';
    import { api }       from './js/core/api.js';
    import { showToast } from './js/components/toast.js';

    requireAuth();

    document.getElementById('form-vacante').addEventListener('submit', async (e) => {
      e.preventDefault();
      const titulo      = document.getElementById('titulo').value.trim();
      const descripcion = document.getElementById('descripcion').value.trim();
      const ubicacion   = document.getElementById('ubicacion').value.trim();
      const salario     = document.getElementById('salario').value.trim() || 'A convenir';
      const modalidad   = document.getElementById('modalidad').value;

      if (!titulo || !descripcion || !ubicacion) {
        showToast('Título, descripción y ubicación son requeridos', 'error');
        return;
      }

      const btn = document.getElementById('btn-publicar');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Publicando...';

      try {
        await api.post('/empleos', { titulo, descripcion, ubicacion, salario, modalidad });
        showToast('Vacante publicada correctamente', 'success');
        document.getElementById('form-vacante').reset();
        setTimeout(() => window.location.href = 'mis-vacantes.html', 1500);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right:8px"></i>Publicar Vacante';
      }
    });

    window.logout = logout;
  </script>
</body>
</html>
