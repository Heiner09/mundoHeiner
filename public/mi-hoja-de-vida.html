<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mundo Equidad – Mi Hoja de Vida</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles/style.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; }

    .page-header {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      padding: 40px 24px; text-align: center;
    }
    .page-header h1 { font-family: 'Rajdhani', sans-serif; font-size: 2rem; color: #fff; margin: 0 0 6px; }
    .page-header p  { color: rgba(255,255,255,.75); margin: 0; font-size: .95rem; }

    .cv-container { max-width: 780px; margin: 40px auto 60px; padding: 0 24px; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,.6); font-size: .9rem; text-decoration: none; transition: color .2s;
    }
    .back-link:hover { color: var(--cyan); }

    .action-btns { display: flex; gap: 10px; }
    .btn-editar {
      padding: 9px 20px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2);
      color: #fff; border-radius: 8px; text-decoration: none;
      font-family: 'Rajdhani', sans-serif; font-size: .92rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 7px; transition: background .2s;
    }
    .btn-editar:hover { background: rgba(255,255,255,.15); }
    .btn-pdf {
      padding: 9px 20px;
      background: rgba(0,200,212,.1); border: 1px solid var(--cyan); color: var(--cyan);
      border-radius: 8px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-size: .92rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 7px; transition: background .2s;
    }
    .btn-pdf:hover { background: rgba(0,200,212,.2); }

    /* Sin CV guardado */
    .empty-cv {
      text-align: center; padding: 60px 24px;
      background: rgba(255,255,255,.04); border: 1px dashed rgba(255,255,255,.15);
      border-radius: 16px;
    }
    .empty-cv i  { font-size: 3rem; color: rgba(255,255,255,.2); margin-bottom: 16px; display: block; }
    .empty-cv h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; color: rgba(255,255,255,.6); margin-bottom: 8px; }
    .empty-cv p  { color: rgba(255,255,255,.4); font-size: .9rem; margin-bottom: 24px; }
    .btn-crear {
      display: inline-flex; align-items: center; gap: 8px; padding: 11px 28px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; text-decoration: none; border-radius: 10px;
      font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    }

    /* Secciones del CV */
    .cv-section {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; padding: 28px; margin-bottom: 20px;
    }
    .cv-section h2 {
      font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; color: var(--cyan);
      margin: 0 0 18px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(0,200,212,.2);
      display: flex; align-items: center; gap: 10px;
    }

    /* Grid datos personales */
    .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
    @media (max-width: 540px) { .dp-grid { grid-template-columns: 1fr; } }
    .dp-field label { display: block; font-size: .78rem; color: rgba(255,255,255,.45); margin-bottom: 3px; }
    .dp-field span  { font-size: .92rem; color: #fff; }

    /* Perfil */
    .perfil-txt { font-size: .92rem; color: rgba(255,255,255,.75); line-height: 1.7; }

    /* Educación */
    .edu-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .edu-item:last-child { border: none; margin: 0; padding: 0; }
    .edu-titulo { font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #fff; margin-bottom: 3px; }
    .edu-inst   { font-size: .88rem; color: rgba(255,255,255,.55); margin-bottom: 6px; }
    .edu-cert a {
      font-size: .82rem; color: var(--cyan); text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .edu-cert a:hover { text-decoration: underline; }

    /* Referencias */
    .refs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 540px) { .refs-grid { grid-template-columns: 1fr; } }
    .ref-card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 16px;
    }
    .ref-nombre { font-family: 'Rajdhani', sans-serif; font-size: 1rem; color: #fff; margin-bottom: 6px; }
    .ref-dato   { font-size: .84rem; color: rgba(255,255,255,.5); margin: 3px 0; display: flex; align-items: center; gap: 7px; }
    .ref-dato i { color: var(--cyan); width: 14px; }

    .loading-txt { color: rgba(255,255,255,.4); text-align: center; padding: 40px 0; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">MUNDO <span>EQUIDAD</span></a>
    <ul class="nav-links">
      <li><button class="btn-nav" onclick="logout()" style="cursor:pointer;border:none;background:transparent;padding:0">
        <i class="fas fa-sign-out-alt"></i> Salir
      </button></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1><i class="fas fa-address-card" style="margin-right:10px"></i>Mi Hoja de Vida</h1>
    <p>Así luce tu perfil profesional guardado</p>
  </div>

  <div class="cv-container">

    <div class="top-bar">
      <a href="dashboard-persona.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Volver al dashboard
      </a>
      <div class="action-btns" id="action-btns" style="display:none">
        <a href="hoja-de-vida.html" class="btn-editar">
          <i class="fas fa-edit"></i> Editar
        </a>
        <button class="btn-pdf" onclick="exportarPDF()">
          <i class="fas fa-file-pdf"></i> Exportar PDF
        </button>
      </div>
    </div>

    <div id="cv-content">
      <p class="loading-txt">Cargando hoja de vida...</p>
    </div>

  </div>

  <div class="toast" id="toast">
    <i class="fas fa-info-circle" id="toast-icon"></i>
    <span id="toast-msg"></span>
  </div>

  <script type="module">
    import { requireAuth, cargarUsuario, logout } from './js/core/auth-guard.js';
    import { exportarCVPDF } from './js/utils/cv-pdf.js';

    requireAuth();

    let cvData = null;

    async function init() {
      const u = await cargarUsuario();
      if (!u) return;

      const content = document.getElementById('cv-content');
      const cv      = u.cv;

      // Sin datos guardados
      const tieneData = cv && (cv.datosPersonales?.nombre || cv.perfilLaboral || cv.educacion?.length || cv.referencias?.length);
      if (!tieneData) {
        content.innerHTML = `
          <div class="empty-cv">
            <i class="fas fa-id-card"></i>
            <h3>Aún no tienes una hoja de vida creada</h3>
            <p>Completa el formulario para que las empresas conozcan tu perfil.</p>
            <a href="hoja-de-vida.html" class="btn-crear">
              <i class="fas fa-plus-circle"></i> Crear mi hoja de vida
            </a>
          </div>`;
        return;
      }

      cvData = cv;
      document.getElementById('action-btns').style.display = 'flex';

      const dp  = cv.datosPersonales  || {};
      const edu = cv.educacion        || [];
      const ref = cv.referencias      || [];
      const fn  = dp.fechaNacimiento  || {};
      const fechaNac = (fn.dia && fn.mes && fn.anio) ? `${fn.dia} de ${fn.mes} de ${fn.anio}` : '—';

      content.innerHTML = `

        <!-- Datos personales -->
        <div class="cv-section">
          <h2><i class="fas fa-user"></i> Datos Personales</h2>
          <div class="dp-grid">
            <div class="dp-field">
              <label>Nombre completo</label>
              <span>${dp.nombre || '—'}</span>
            </div>
            <div class="dp-field">
              <label>Cédula de ciudadanía</label>
              <span>${dp.cedula || '—'}</span>
            </div>
            <div class="dp-field">
              <label>Fecha de nacimiento</label>
              <span>${fechaNac}</span>
            </div>
            <div class="dp-field">
              <label>Ciudad</label>
              <span>${dp.ciudad || '—'}</span>
            </div>
            <div class="dp-field">
              <label>Número de contacto</label>
              <span>${dp.telefono || '—'}</span>
            </div>
            <div class="dp-field">
              <label>Dirección de residencia</label>
              <span>${dp.direccion || '—'}</span>
            </div>
          </div>
        </div>

        <!-- Perfil laboral -->
        <div class="cv-section">
          <h2><i class="fas fa-briefcase"></i> Perfil Laboral</h2>
          <p class="perfil-txt">${cv.perfilLaboral || '—'}</p>
        </div>

        <!-- Educación -->
        <div class="cv-section">
          <h2><i class="fas fa-graduation-cap"></i> Educación</h2>
          ${edu.length
            ? edu.map(e => `
              <div class="edu-item">
                <p class="edu-titulo">${e.titulo || '—'}</p>
                <p class="edu-inst">${e.institucion || ''}</p>
                ${(e.fechaGrad?.mes || e.fechaGrad?.anio)
                  ? `<p class="edu-inst" style="color:rgba(255,255,255,.4);font-size:.82rem"><i class="fas fa-calendar-alt" style="margin-right:5px"></i>${[e.fechaGrad.mes, e.fechaGrad.anio].filter(Boolean).join(' ')}</p>`
                  : ''}
                ${e.certUrl
                  ? `<div class="edu-cert"><a href="${e.certUrl}" target="_blank"><i class="fas fa-paperclip"></i> ${e.certNombre || 'Ver certificado'}</a></div>`
                  : ''}
              </div>`).join('')
            : '<p style="color:rgba(255,255,255,.4);font-size:.9rem">No se registró información de educación.</p>'
          }
        </div>

        <!-- Referencias -->
        <div class="cv-section">
          <h2><i class="fas fa-users"></i> Referencias Personales</h2>
          ${ref.length
            ? `<div class="refs-grid">${ref.map(r => `
              <div class="ref-card">
                <p class="ref-nombre">${r.nombre}</p>
                ${r.ocupacion ? `<p class="ref-dato"><i class="fas fa-briefcase"></i>${r.ocupacion}</p>` : ''}
                ${r.direccion ? `<p class="ref-dato"><i class="fas fa-map-marker-alt"></i>${r.direccion}</p>` : ''}
                ${r.telefono  ? `<p class="ref-dato"><i class="fas fa-phone"></i>${r.telefono}</p>` : ''}
              </div>`).join('')}</div>`
            : '<p style="color:rgba(255,255,255,.4);font-size:.9rem">No se registraron referencias.</p>'
          }
        </div>
      `;
    }

    function exportarPDF() {
      if (!cvData) return;
      exportarCVPDF(cvData);
    }

    window.exportarPDF = exportarPDF;
    window.logout      = logout;

    init();
  </script>
</body>
</html>
